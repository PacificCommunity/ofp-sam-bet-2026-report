name: ofp-sam-bet-2026-report
description: Collaborative BET 2026 report writing workspace using figures and tables committed with the report.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow@sha256:71b97b4bdefa091a55284e45bbddfa330171a0674e8e4a32895424d6c8a100de
resources:
  cpus: 4
  memory: 12GB
  disk: 10GB

env:
  JOB_TITLE: Paul report writing workspace
  JOB_DESCRIPTION: Continue writing from this job's collab/paul-writing snapshot, then commit and push the edits from RStudio.
  JOB_KEY: paul-writing
  FLOW_GROUP: bet-2026-writing
  REPORT_DIR: bet-2026-report
  REPORT_QMD: assessment-report.qmd
  REPORT_FILE_STEM: bet-2026-report
  REPORT_RENDER_HTML: "true"
  FLOW_SPECIES: BET
  FLOW_SPECIES_LABEL: bigeye tuna
  FLOW_ASSESSMENT_YEAR: "2026"
  KFLOW_RSTUDIO_FOLLOW_BRANCH: "true"
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "false"
  KFLOW_RUNTIME_UPDATE: never
  TUNA_FLOW_RUNTIME_UPDATE: never
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: none
  KFLOW_REPORT_COMMIT_GENERATED: "false"
  KFLOW_REPORT_PUSH_GENERATED: "false"
  KFLOW_REPORT_PUBLISH_REQUIRED: "false"
  KFLOW_REPORT_RESEED_GENERATED_SECTIONS: "false"

output_patterns:
  - outputs/**

job_config:
  optional:
    - FLOW_GROUP
    - JOB_TITLE
    - JOB_DESCRIPTION
    - JOB_KEY
    - REPORT_DIR
    - REPORT_QMD
    - REPORT_FILE_STEM
    - REPORT_RENDER_HTML
    - OUTPUT_DIR
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - KFLOW_RSTUDIO_FOLLOW_BRANCH
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - TUNA_FLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_REPO_RUNTIME_PACKAGES
    - KFLOW_REPORT_COMMIT_GENERATED
    - KFLOW_REPORT_PUSH_GENERATED
    - KFLOW_REPORT_PUBLISH_REQUIRED
    - KFLOW_REPORT_RESEED_GENERATED_SECTIONS
