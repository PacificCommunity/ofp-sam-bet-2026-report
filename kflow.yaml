name: ofp-sam-bet-2026-report
description: Render the BET 2026 report directly from generated result figures and tables.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.2
resources:
  cpus: 4
  memory: 12GB
  disk: 8GB

env:
  JOB_TITLE: BET report
  JOB_DESCRIPTION: Render the assessment report from generated BET results.
  JOB_KEY: report
  FLOW_GROUP: bet-2026-base
  REPORT_DIR: bet-2026-report
  REPORT_QMD: assessment-report.qmd
  REPORT_FILE_STEM: bet-2026-report
  REPORT_RENDER_HTML: "false"
  FLOW_SPECIES: BET
  FLOW_SPECIES_LABEL: bigeye tuna
  FLOW_ASSESSMENT_YEAR: "2026"
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "false"
  KFLOW_RUNTIME_UPDATE: never
  TUNA_FLOW_RUNTIME_UPDATE: never
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: none
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  KFLOW_REPORT_COMMIT_GENERATED: "false"
  KFLOW_REPORT_PUSH_GENERATED: "false"
  KFLOW_REPORT_PUBLISH_REQUIRED: "false"
  KFLOW_REPORT_RESEED_GENERATED_SECTIONS: "true"
input_jobs:
  - report: ofp-sam-bet-2026-results
    latest: 1
output_patterns:
  - outputs/**
job_config:
  optional:
    - FLOW_GROUP
    - JOB_TITLE
    - JOB_DESCRIPTION
    - JOB_KEY
    - REPORT_DIR
    - REPORT_QMD
    - REPORT_FILE_STEM
    - REPORT_RENDER_HTML
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - RESULTS_JOB_ID
    - RESULTS_JOB_IDS
    - OUTPUTS_JOB_ID
    - OUTPUTS_JOB_IDS
    - INPUT_DIR
    - OUTPUT_DIR
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - TUNA_FLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_REPO_RUNTIME_PACKAGES
    - KFLOW_RUNTIME_GITHUB_AUTH
    - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
    - KFLOW_REPORT_COMMIT_GENERATED
    - KFLOW_REPORT_PUSH_GENERATED
    - KFLOW_REPORT_PUBLISH_REQUIRED
    - KFLOW_REPORT_RESEED_GENERATED_SECTIONS
